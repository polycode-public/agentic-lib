# release.yml — on a vN.N.N tag: test, npm publish the @polycode-public/agentic-lib
# scope, and move the `v8` major tag to this commit so consumers pinning
# transform.yml@v8 track the release.
name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Move the v8 major tag
        run: |
          set -euo pipefail
          MAJOR="v$(node -p "require('./package.json').version.split('.')[0]")"
          git tag -f "$MAJOR"
          git push -f origin "$MAJOR"
