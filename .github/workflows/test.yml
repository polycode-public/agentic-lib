# test.yml — lint + vitest + workflow validation for agentic-lib itself.
name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run lint:workflows
      - run: npm run linting
      - run: npm test
